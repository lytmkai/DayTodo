<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayTodo - 每日清单</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --bg: #f5f7fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #333; max-width: 600px; margin: 0 auto; padding: 0 20px; }
        h1 { text-align: center; color: #2c3e50; margin: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }
        
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); }
        .btn-add { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: #357abd; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; animation: fadeIn 0.3s ease; }
        li:last-child { border-bottom: none; }
        
        .task-content { flex: 1; margin-left: 12px; }
        .task-title { font-size: 1.1em; display: block; }

        .actions { display: flex; gap: 8px; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .btn-check { background: #e8f5e9; color: var(--success); }
        .btn-check:hover { background: var(--success); color: white; }
        .btn-del { background: #ffebee; color: var(--danger); }
        .btn-del:hover { background: var(--danger); color: white; }
        
        .history-box { margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        .history-header { display: flex; gap: 10px; margin-bottom: 15px; }
        .history-item { padding: 10px; background: #fafafa; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <h1>DayTodo</h1>
    <div class="subtitle">📅 {{ .Today }}</div>

    <div class="card">
        <!-- 添加任务 -->
        <div class="input-group">
            <input type="text" id="titleInput" placeholder="添加常驻任务..." onkeypress="if(event.key==='Enter') addTask()">
            <button class="btn-add" onclick="addTask()">添加</button>
        </div>

        <!-- 任务列表 -->
        <ul id="taskList">
            {{ range .Tasks }}
            <li id="task-row-{{ .ID }}">
                <div class="task-content">
                    <span class="task-title">{{ .Title }}</span>
                </div>
                <div class="actions">
                    <button class="btn btn-check" onclick="completeTask({{ .ID }}, '{{ .Title }}')">完成</button>
                    <button class="btn btn-del" onclick="deleteTask({{ .ID }})">删除</button>
                </div>
            </li>
            {{ end }}
        </ul>

        <!-- 历史复盘 -->
        <div class="history-box">
            <h3>🔍 今日已完成</h3>
            <!-- 移除todayHistoryResult，现在统一在historyResult中显示 -->
            
            <div class="history-header" style="margin-top: 20px; border-top: 1px dashed #eee; padding-top: 15px;">
                <h4 style="margin: 0 10px 0 0;">查询往期:</h4>
                <input type="date" id="historyDate">
                <button class="btn-add" style="padding: 8px 15px;" onclick="queryHistory()">查询</button>
            </div>
            <div id="historyResult"></div>
        </div>
    </div>

    <script>
        // 初始化日期

        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');

        const dateStr = `${year}-${month}-${day}`;
        
        
        document.getElementById('historyDate').value = dateStr;

        // 页面加载时，渲染今日已完成列表
        window.onload = function() {
            queryHistory(); // 加载今日历史
        };

        async function addTask() {
            const input = document.getElementById('titleInput');
            const title = input.value.trim();
            if (!title) return;
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title: title })
            });
            input.value = '';
            location.reload();
        }

        async function completeTask(id, title) {
            const res = await fetch(`/api/tasks/${id}/complete`, { method: 'POST' });
            if (res.ok) {
                const data = await res.json();
                // 1. 从上方列表移除
                const row = document.getElementById(`task-row-${id}`);
                if (row) {
                    row.style.opacity = '0';
                    row.style.transform = 'translateX(20px)';
                    row.style.transition = '0.3s';
                    setTimeout(() => row.remove(), 300);
                }
                
                // 2. 触发一次今日历史查询，更新historyResult
                queryHistory();
            }
        }

        async function deleteTask(id) {
            if(!confirm('确定删除此任务吗？')) return;
            await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
            location.reload();
        }

        async function queryHistory() {
            const date = document.getElementById('historyDate').value;
            const res = await fetch(`/api/history?date=${date}`);
            const data = await res.json();
            
            // 统一在historyResult中显示所有历史记录
            const targetContainer = document.getElementById('historyResult');

            if (data.length === 0) {
                targetContainer.innerHTML = '<p style="text-align:center; color:#999; margin: 10px 0;">暂无记录</p>';
                return;
            }

            let html = '';
            data.forEach(record => {
                const timeText = record.completed_at ? ` (${new Date(record.completed_at).toLocaleTimeString()})` : '';
                html += `
                <div class="history-item">
                    <span>${record.task.title}</span>
                    <span style="color: #2ecc71; font-size: 0.85em;">✅ 已完成${timeText}</span>
                </div>`;
            });
            targetContainer.innerHTML = html;
        }
    </script>
</body>
</html>
